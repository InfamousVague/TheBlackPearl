name: Release

# Build the Windows + Linux desktop bundles on a version tag and attach them to
# the GitHub Release that mattssoftware.com's download buttons resolve. The
# macOS build is produced LOCALLY by the maintainer (`make deploy` on an Apple
# Silicon Mac: Developer-ID-signed, Apple-notarized, OTA-signed) — the same
# split Libre.academy uses, because codesign/notarize is slow + flaky on hosted
# macOS runners. The `macos` job below is kept but DISABLED for reference.
#
# OTA auto-update: createUpdaterArtifacts is on in tauri.conf.json, so every
# bundle is paired with a minisign `.sig`. CI signs the Windows/Linux artifacts
# with TAURI_SIGNING_PRIVATE_KEY, and the `manifest` job assembles latest.json
# from the release's assets; `make deploy` later merges the macOS platform in
# (the manifest builder merges, so either order converges). The updater endpoint
# (tauri.conf.json plugins.updater) resolves to the release's latest.json.
#
# The @mattmattmattmatt/base "file:../../Libs/base" dependency is materialized
# from the sibling InfamousVague/base repo before `npm ci` (same dance Libre +
# Blip use), so the relative path package.json expects resolves on every runner.
#
# Trigger:
#   - push a tag like v0.1.1  →  builds Windows + Linux, uploads them + their
#                                signed updater artifacts, then writes latest.json.
#   - workflow_dispatch       →  smoke-builds Windows + Linux (artifacts on the run).
#
# Required repo secrets:
#   TAURI_SIGNING_PRIVATE_KEY           minisign private key (contents of
#                                       ~/.tauri/blackpearl-updater.key)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  its password (empty for this key)
# (The APPLE_* secrets are only used by the disabled in-CI macOS job.)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the release + upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Windows + Linux on their native runners. tauri-action creates the release
  # (on tag) and uploads the bundles + their .sig updater artifacts to it. Linux
  # ships .AppImage + .deb + .rpm (the APPIMAGE_EXTRACT_AND_RUN / NO_STRIP env is
  # the standard FUSE-less CI workaround). AppImage is the OTA-capable Linux
  # format; .deb/.rpm cover package-manager installs.
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: Linux (x64)
            args: "--bundles appimage,deb,rpm"
          - os: windows-latest
            label: Windows (x64)
            args: ""

    steps:
      - uses: actions/checkout@v4

      # Materialize the @mattmattmattmatt/base "file:../../Libs/base" dep by
      # checking out the sibling repo and copying it where package.json expects.
      # Copy (not symlink) so Windows runners don't need admin / developer mode.
      - name: Check out @mattmattmattmatt/base
        uses: actions/checkout@v4
        with:
          repository: InfamousVague/base
          path: _base
      - name: Wire _base into ../../Libs/base
        shell: bash
        run: |
          mkdir -p ../../Libs
          cp -R _base ../../Libs/base
          test -d ../../Libs/base/primitives || { echo "Libs/base/primitives missing — wiring is wrong"; exit 1; }

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            patchelf build-essential libssl-dev

      # Belt-and-suspenders: the Base design system resolves only through Vite's
      # bundler, never tsc, so force the CI build to skip tsc even if the local
      # build script ever gets reverted to "tsc && vite build".
      - name: Force vite-only build for CI
        shell: bash
        run: npm pkg set scripts.build="vite build"

      - name: Install npm deps
        run: npm ci

      # Bundle the ffmpeg/ffprobe sidecar (GPL static) so a clean machine can transcode
      # MKV/HEVC/AC-3 without a system ffmpeg. Placed with Tauri's <name>-<target-triple>
      # naming; tauri.{linux,windows}.conf.json's externalBin picks them up per platform.
      - name: Fetch ffmpeg sidecar (Linux)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          # GitHub-hosted (BtbN), same source as the Windows sidecar — johnvansickle.com
          # rate-limits CI-runner IPs, which intermittently fails the Linux job.
          curl -sL --fail --retry 5 --retry-all-errors -o /tmp/ff.tar.xz "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz"
          tar -xf /tmp/ff.tar.xz -C /tmp
          d=$(find /tmp -maxdepth 1 -type d -name 'ffmpeg-*-linux64-gpl' | head -1)
          cp "$d/bin/ffmpeg"  src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
          cp "$d/bin/ffprobe" src-tauri/binaries/ffprobe-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu src-tauri/binaries/ffprobe-x86_64-unknown-linux-gnu

      - name: Fetch ffmpeg sidecar (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "$env:TEMP\ff.zip"
          Expand-Archive -Path "$env:TEMP\ff.zip" -DestinationPath "$env:TEMP\ff" -Force
          $bin = Get-ChildItem -Path "$env:TEMP\ff" -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $bin.FullName "src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe"
          Copy-Item (Join-Path $bin.DirectoryName "ffprobe.exe") "src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe"

      - name: Build & attach to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Sign the updater artifacts so OTA clients can verify them against the
          # pubkey in tauri.conf.json. The key has no password (empty secret).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # AppImage tooling (linuxdeploy) is itself an AppImage; ubuntu runners
          # lack libfuse2, so extract-and-run instead of FUSE-mounting. NO_STRIP
          # avoids a linuxdeploy strip failure. Both are no-ops on Windows.
          APPIMAGE_EXTRACT_AND_RUN: 1
          NO_STRIP: true
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('GhostWire {0}', github.ref_name) || '' }}
          releaseBody: "Desktop builds for macOS, Windows, and Linux."
          releaseDraft: false
          prerelease: false
          # Windows updater points at the NSIS -setup.exe (silent background
          # install), not the .msi (which needs UAC elevation).
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

  # Assemble the unified OTA feed (latest.json) from the release's signed
  # updater assets. tauri-action writes a PER-PLATFORM latest.json that the
  # matrix would clobber to one platform, so this rebuilds it from every
  # uploaded .sig and MERGES with any existing manifest — so the maintainer's
  # local `make deploy` (macOS) and this CI run (Windows/Linux) don't wipe each
  # other regardless of order.
  manifest:
    name: Assemble latest.json (OTA feed)
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Make + upload release torrents (P2P distribution)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/make-release-torrents.mjs --tag "${{ github.ref_name }}"
      - name: Build + upload the updater manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/build-updater-manifest.mjs "${{ github.ref_name }}"

  # macOS in CI — DISABLED (`if: ${{ false }}`). Mac builds are produced locally
  # via `make deploy` (Developer-ID-signed + Apple-notarized + OTA-signed),
  # mirroring Libre.academy, because hosted macOS runners are slow/flaky for
  # codesign + notarize. Kept here for reference / a future re-enable. To turn it
  # back on, flip the `if` to `github.ref_type == 'tag'` and add the OTA signing
  # env (TAURI_SIGNING_PRIVATE_KEY{,_PASSWORD}) + the re-tar/re-sign of the
  # updater tarball that scripts/mac-ota.sh does, or it will ship an unsigned
  # OTA bundle.
  macos:
    name: macOS (signed + notarized)
    needs: build
    if: ${{ false }}
    runs-on: macos-14
    timeout-minutes: 90 # fail fast instead of burning the 6h cap if codesign hangs
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Check out @mattmattmattmatt/base
        uses: actions/checkout@v4
        with:
          repository: InfamousVague/base
          path: _base
      - name: Wire _base into ../../Libs/base
        shell: bash
        run: |
          mkdir -p ../../Libs
          cp -R _base ../../Libs/base
          test -d ../../Libs/base/primitives || { echo "Libs/base/primitives missing — wiring is wrong"; exit 1; }

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          # Universal binary → one DMG for both Apple Silicon and Intel.
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Force vite-only build for CI
        run: npm pkg set scripts.build="vite build"

      - name: Install npm deps
        run: npm ci

      # Proven Blip pattern: load the Developer ID cert from the base64 .p12
      # secret into a throwaway build keychain so codesign can find the identity
      # tauri.conf.json references.
      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "::error::APPLE_CERTIFICATE secret missing on InfamousVague/GhostWire.tv."
            echo "Set APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY +"
            echo "APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID (mirror the Blip repo)."
            exit 1
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm certificate.p12

      # `tauri build` codesigns the .app with the Developer ID identity from
      # tauri.conf.json (hardened runtime + Entitlements.plist) and produces the
      # universal .dmg + the signed updater tarball.
      - name: Build signed universal app + DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target universal-apple-darwin --bundles app,dmg

      - name: Notarize + staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          [ -n "$DMG" ] || { echo "::error::no DMG produced under universal-apple-darwin/release/bundle/dmg"; exit 1; }
          echo "Notarizing: $DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_PASSWORD" --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Upload signed DMG to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          gh release upload "${{ github.ref_name }}" "$DMG" --clobber --repo "${{ github.repository }}"
          echo "Uploaded signed + notarized DMG: $DMG"
